{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-danger" style="font-size: 3rem;"></i>
                    <h4 class="mt-2">Iniciar Sesión</h4>
                </div>

                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo Electrónico</label>
                        <input type="email"
                               class="form-control"
                               id="correo"
                               name="email"
                               required
                               placeholder="correo@ejemplo.com"
                               autocomplete="email">
                        <div class="invalid-feedback">
                            Ingrese un correo electrónico válido.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="contrasena" class="form-label">Contraseña</label>
                        <input type="password"
                               class="form-control"
                               id="contrasena"
                               name="password"
                               required
                               minlength="6"
                               placeholder="••••••••"
                               autocomplete="current-password">
                        <div class="invalid-feedback">
                            La contraseña debe tener al menos 6 caracteres.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-danger w-100 mb-3" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                    </button>

                    <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
                    <div id="loginSuccess" class="alert alert-success d-none" role="alert"></div>

                    <p class="text-center mb-0">
                        ¿No tiene cuenta?
                        <a href="/register/" class="text-danger">Regístrese aquí</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function showMessage(elementId, message, isError) {
    var div = document.getElementById(elementId);
    var otherId = isError ? 'loginSuccess' : 'loginError';
    var otherDiv = document.getElementById(otherId);

    if (div) {
        div.textContent = message;
        div.classList.remove('d-none');
    }
    if (otherDiv) {
        otherDiv.classList.add('d-none');
    }
}

function hideMessages() {
    var errorDiv = document.getElementById('loginError');
    var successDiv = document.getElementById('loginSuccess');
    if (errorDiv) errorDiv.classList.add('d-none');
    if (successDiv) successDiv.classList.add('d-none');
}

function setButtonLoading(loading) {
    var btn = document.getElementById('loginBtn');
    if (!btn) return;
    if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';
    } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Ingresar';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    var token = localStorage.getItem('access_token');
    if (token) {
        showMessage('loginSuccess', 'Ya has iniciado sesión. Redirigiendo...', false);
        setTimeout(function() {
            window.location.href = '/';
        }, 1200);
        return;
    }

    var form = document.getElementById('loginForm');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            var correo = document.getElementById('correo').value.trim();
            var contrasena = document.getElementById('contrasena').value;

            hideMessages();

            if (!correo || !correo.includes('@')) {
                form.classList.add('was-validated');
                showMessage('loginError', 'Ingrese un correo electrónico válido.', true);
                return;
            }

            if (!contrasena || contrasena.length < 6) {
                form.classList.add('was-validated');
                showMessage('loginError', 'La contraseña debe tener al menos 6 caracteres.', true);
                return;
            }

            setButtonLoading(true);

            var body = JSON.stringify({
                email: correo,
                password: contrasena
            });

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/auth/login/', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Accept', 'application/json');

            xhr.onload = function() {
                setButtonLoading(false);

                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (data.access_token) {
                            localStorage.setItem('access_token', data.access_token);
                            showMessage('loginSuccess', 'Inicio de sesión exitoso! Redirigiendo...', false);

                            setTimeout(function() {
                                window.location.href = '/';
                            }, 1000);
                            return;
                        }
                    } catch (e) {
                        console.error('Error parseando JSON:', e);
                    }
                    showMessage('loginError', 'Respuesta inválida del servidor.', true);
                } else if (xhr.status === 401) {
                    var errMsg = 'Credenciales inválidas.';
                    try {
                        var err = JSON.parse(xhr.responseText);
                        errMsg = err.detail || errMsg;
                    } catch (e) {}
                    showMessage('loginError', errMsg, true);
                } else {
                    showMessage('loginError', 'Error del servidor (HTTP ' + xhr.status + ')', true);
                }
            };

            xhr.onerror = function() {
                setButtonLoading(false);
                showMessage('loginError', 'Error de conexión. Verifique que el servidor esté corriendo.', true);
            };

            try {
                xhr.send(body);
            } catch (e) {
                setButtonLoading(false);
                showMessage('loginError', 'Error: ' + e, true);
            }
        });
    }
});
</script>
{% endblock %}
